<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumiora</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f6fa;
}

.login-page,
.home-page{
padding:20px;
}

.logo{
font-size:40px;
font-weight:bold;
text-align:center;
margin-top:30px;
}

.subtitle{
text-align:center;
color:gray;
margin-bottom:30px;
}

.login-btn{
width:100%;
padding:15px;
margin-top:12px;
border:none;
border-radius:14px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.google{background:#4285F4;color:white;}
.apple{background:black;color:white;}
.x{background:#111;color:white;}
.guest{background:#e5e5e5;}

.hidden{
display:none;
}

.topbar{
background:white;
padding:20px;
border-radius:18px;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.card{
background:white;
padding:20px;
border-radius:18px;
text-align:center;
font-weight:bold;
cursor:pointer;
box-shadow:0 3px 10px rgba(0,0,0,.08);
}

.action{
display:flex;
gap:10px;
margin-bottom:15px;
}

.action button{
flex:1;
padding:15px;
border:none;
border-radius:14px;
font-weight:bold;
}

.bottom{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
display:flex;
justify-content:space-around;
padding:15px;
box-shadow:0 -2px 10px rgba(0,0,0,.1);
}
</style>
</head>

<body>

<div id="loginPage" class="login-page">

<div class="logo">Lumiora</div>
<div class="subtitle">AI Photo & Video Editor</div>

<button class="login-btn google" onclick="login('Google')">
Continue with Google
</button>

<button class="login-btn apple" onclick="login('Apple')">
Continue with Apple
</button>

<button class="login-btn x" onclick="login('X')">
Continue with X
</button>

<button class="login-btn guest" onclick="login('Guest')">
Continue as Guest
</button>

</div>

<div id="homePage" class="home-page hidden">

<div class="topbar">
<h2> Lumiora</h2>
<p>Welcome to AI Beauty Studio</p>
</div>

<div class="action">
<button onclick="camera()"> Camera</button>
<button onclick="gallery()"> Gallery</button>
</div>

<div class="grid">

<div class="card" onclick="feature('Face Editor')"> Face Editor</div>
<div class="card" onclick="feature('Body Editor')"> Body Editor</div>

<div class="card" onclick="feature('Hair Editor')"> Hair Editor</div>
<div class="card" onclick="feature('Makeup Editor')"> Makeup Editor</div>

<div class="card" onclick="feature('Fashion AI')"> Fashion AI</div>
<div class="card" onclick="feature('AI Enhance')"> AI Enhance</div>

<div class="card" onclick="feature('AI Background')"> AI Background</div>
<div class="card" onclick="feature('Photo Editor')"> Photo Editor</div>

<div class="card" onclick="feature('Video Editor')"> Video Editor</div>
<div class="card" onclick="feature('Filters')"> Filters</div>

</div>

<div class="bottom">
<div> Home</div>
<div> Camera</div>
<div> Profile</div>
</div>

</div>

<script>

function login(provider){
alert("Login dengan " + provider);
document.getElementById("loginPage").classList.add("hidden");
document.getElementById("homePage").classList.remove("hidden");
}

function camera(){
alert("Camera feature coming soon");
}

function gallery(){
alert("Gallery feature coming soon");
}

function feature(name){
alert(name + " coming soon");
}

</script>

</body>
    </html>
