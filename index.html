<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumiora</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#f4f6fb;
}

header{
  background:white;
  padding:20px;
  text-align:center;
  box-shadow:0 2px 10px rgba(0,0,0,.1);
}

h1{
  font-size:30px;
}

.subtitle{
  color:#666;
  margin-top:5px;
}

.container{
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:15px;
}

.card{
  background:white;
  border-radius:18px;
  padding:25px 10px;
  text-align:center;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.icon{
  font-size:40px;
  margin-bottom:10px;
}

footer{
  text-align:center;
  padding:20px;
  color:#777;
}
</style>
</head>

<body>

header>
  <h1>Lumiora</h1>
  <div class="subtitle">AI Photo & Video Editor</div>
</header>

<div class="container">
  <div class="grid">

    <div class="card">
      <div class="icon"></div>
      <h3>Face Editor</h3>
    </div>

    <div class="card">
      <div class="icon"></div>
      <h3>Body Editor</h3>
    </div>

    <div class="card">
      <div class="icon"></div>
      <h3>Hair Editor</h3>
    </div>

    <div class="card">
      <div class="icon"></div>
      <h3>Makeup Editor</h3>
    </div>

    <div class="card">
      <div class="icon"></div>
      <h3>Fashion AI</h3>
    </div>

    <div class="card">
      <div class="icon"></div>
      <h3>AI Enhance</h3>
    </div>

    <div class="card">
      <div class="icon"></div>
      <h3>AI Background</h3>
    </div>

    <div class="card">
      <div class="icon"></div>
      <h3>Photo Editor</h3>
    </div>

    <div class="card">
      <div class="icon"></div>
      <h3>Video Editor</h3>
    </div>

  </div>
</div>

<footer>
  © 2026 Lumiora
</footer>

</body>
</html>
