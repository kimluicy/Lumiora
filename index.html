<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumiora</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f6fb;
}

header{
    background:white;
    padding:20px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.subtitle{
    text-align:center;
    color:#666;
    margin-top:8px;
}

.container{
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:15px;
}

.card{
    background:white;
    border-radius:18px;
    padding:25px 10px;
    text-align:center;
    cursor:pointer;
    transition:.3s;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.card:hover{
    transform:translateY(-5px);
}

.icon{
    font-size:40px;
    margin-bottom:10px;
}

.card h3{
    font-size:16px;
}

footer{
    text-align:center;
    padding:20px;
    color:#777;
}
</style>
</head>

<header>
    Lumiora
    <div class="subtitle">AI Photo & Video Editor</div>
</header>

    <div class="grid">
